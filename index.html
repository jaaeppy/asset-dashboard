<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 대시보드</title>

  <link rel="apple-touch-icon" href="./favicon.png?v=4">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgeY6qfKMNPcpHhv1hzPaTV6-KGUfzYX8",
      authDomain: "asset-dashboard-8931b.firebaseapp.com",
      databaseURL: "https://asset-dashboard-8931b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "asset-dashboard-8931b",
      storageBucket: "asset-dashboard-8931b.firebasestorage.app",
      messagingSenderId: "208488426896",
      appId: "1:208488426896:web:66936fe1a9b2a1e7955715"

    const app = initializeApp(firebaseConfig);

    // 전역에 Firebase 함수 노출

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-hover: #222632;
      --border: #2a2e3b;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --accent: #6c7bff;
      --accent-light: #8b97ff;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding: 24px 28px;
      background: var(--card); border-radius: 16px; border: 1px solid var(--border);
    }
    .header-left h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .header-left .date { font-size: 13px; color: var(--text-muted); }
    .header-right { text-align: right; }
    .total-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    .total-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
    .total-pnl { font-size: 14px; margin-top: 2px; }
    .exchange-rate { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .exchange-rate span { color: var(--accent-light); font-weight: 500; }

    /* ===== CHARTS ===== */
    .charts-section {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .chart-card {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--border); padding: 24px;
    }
    .chart-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text-muted); }
    .chart-wrapper { position: relative; height: 280px; }
    .chart-legend { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-value { color: var(--text); font-weight: 500; }

    /* ===== TOOLBAR ===== */
    .toolbar { display: flex; gap: 8px; margin-bottom: 20px; justify-content: flex-end; align-items: center; }
    .toolbar .status { font-size: 12px; color: var(--text-muted); margin-right: auto; }

    /* ===== ACCOUNTS ===== */
    .accounts-section { display: flex; flex-direction: column; gap: 20px; }
    .account-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .account-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; background: rgba(108,123,255,0.05);
      border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    }
    .account-header:hover { background: rgba(108,123,255,0.1); }
    .account-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .toggle-icon { transition: transform 0.2s; color: var(--text-muted); font-size: 12px; }
    .collapsed .toggle-icon { transform: rotate(-90deg); }
    .account-subtotal { display: flex; gap: 24px; align-items: center; }
    .subtotal-item { text-align: right; }
    .subtotal-label { font-size: 11px; color: var(--text-muted); }
    .subtotal-value { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .account-body { overflow: hidden; }
    .account-body.collapsed { display: none; }

    /* ===== TABLE ===== */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 10px 12px; text-align: right; font-weight: 500;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      font-size: 12px; white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    tbody td {
      padding: 8px 12px; text-align: right;
      border-bottom: 1px solid rgba(42,46,59,0.5); white-space: nowrap;
    }
    tbody td:first-child { text-align: left; font-weight: 500; }
    tbody tr:hover { background: var(--card-hover); }
    tbody tr:last-child td { border-bottom: none; }
    .positive { color: var(--red); }
    .negative { color: var(--blue); }

    /* ===== EDITABLE CELLS ===== */
    .cell-edit {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); padding: 4px 8px; border-radius: 4px;
      font-size: 13px; font-family: inherit; text-align: right;
      width: 100px; outline: none;
    }
    .cell-edit:focus { border-color: var(--accent); background: rgba(108,123,255,0.1); }
    /* 드래그 정렬 */
    tr.dragging { opacity: 0.4; }
    tr.drag-over { border-top: 2px solid var(--accent); }
    td.drag-handle { cursor: grab; color: var(--text-muted); font-size: 16px; padding: 0 6px; user-select: none; }
    td.drag-handle:active { cursor: grabbing; }

    /* ===== SEARCH / ADD ===== */
    .add-area {
      padding: 12px 24px; border-top: 1px solid var(--border);

    }
    .search-wrap { position: relative; }
    .search-input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 8px;
      font-size: 13px; font-family: inherit; width: 260px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      position: fixed; width: 380px;
      background: #1e2130; border: 1px solid var(--accent);
      border-radius: 10px; overflow-y: auto;
      z-index: 9999; display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 10px 16px; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(42,46,59,0.5); gap: 12px;
      min-height: 52px;
    }
    .search-result-item:hover, .search-result-item.active {
      background: rgba(108,123,255,0.2);
    }
    .search-result-item:last-child { border-bottom: none; }
    .sr-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .sr-name { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-meta { display: flex; align-items: center; gap: 6px; }
    .sr-code { color: var(--text-muted); font-size: 12px; font-family: monospace; }
    .sr-market { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 3px; }

    .sr-market.kosdaq { background: rgba(34,197,94,0.2); color: #4ade80; }
    .sr-market.us { background: rgba(108,123,255,0.2); color: var(--accent-light); }
    .sr-market.etf { background: rgba(234,179,8,0.2); color: var(--yellow); }

    .add-input {

    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-muted); }

    .btn {

    .btn-outline {

    .btn-icon {

    }
    .btn-icon:hover { color: var(--red); }
    .btn-refresh { color: var(--text-muted); font-size: 12px; cursor: pointer; background: none; border: none; padding: 2px 4px; }
    .btn-refresh:hover { color: var(--accent-light); }
    .broker-input {

      background: rgba(108,123,255,0.15); color: var(--accent-light);
      border: 1px solid transparent; outline: none; width: 52px;
      cursor: pointer; text-align: center;
    }
    .broker-input:hover { border-color: rgba(108,123,255,0.4); }
    .broker-input:focus { background: rgba(108,123,255,0.25); border-color: var(--accent); cursor: text; }
    .broker-input::placeholder { color: rgba(139,143,163,0.5); }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;

    }
    .badge-cash { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-dollar { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-domestic { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-foreign { background: rgba(236,72,153,0.15); color: #ec4899; }
    .badge-isa { background: rgba(108,123,255,0.15); color: var(--accent-light); }

    .loading-spinner {

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #2d3148; color: var(--text); padding: 12px 20px;
      border-radius: 10px; font-size: 13px; z-index: 1000;
      border: 1px solid var(--border); opacity: 0; transition: opacity 0.3s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);

    @media (max-width: 768px) {
      body { padding: 12px; }
      .charts-section { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 16px; text-align: center; }
      .header-right { text-align: center; }
      .total-value { font-size: 24px; }
      .search-input { width: 200px; }
      .add-input { width: 90px; }

      /* 계좌 헤더: 뱃지+토글 위, 소계 아래로 분리 */
      .account-header { flex-direction: column; align-items: flex-start; gap: 6px; padding: 12px 16px; }
      .account-header h3 { width: 100%; display: flex; justify-content: space-between; }
      .account-subtotal { width: 100%; justify-content: flex-end; gap: 16px; }
      .subtotal-value { font-size: 13px; }
      .subtotal-label { font-size: 10px; }
    }
  </style>

<body>

<div class="header">

<div class="toast" id="toast"></div>

<script>
// ===================================================================
// CONFIG
// ===================================================================
async function fetchWithTimeout(url, ms = 5000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return res;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

async function corsFetch(url) {
  // 1) corsproxy.io (가장 안정적)
  try {
    const res = await fetchWithTimeout(`https://corsproxy.io/?url=${encodeURIComponent(url)}`, 6000);
    if (res.ok) return res;
  } catch(e) {}

  // 2) allorigins
  try {
    const res = await fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, 5000);
    if (res.ok) return res;
  } catch(e) {}

  // 3) 직접 요청
  try {
    const res = await fetchWithTimeout(url, 4000);
    if (res.ok) return res;
  } catch(e) {}

  return null;
}

const ACCOUNTS = [
  { id: 'cash',     name: '현금',     badge: 'badge-cash',     type: 'cash' },
  { id: 'dollar',   name: '달러',     badge: 'badge-dollar',   type: 'dollar' },
  { id: 'domestic', name: '국내주식', badge: 'badge-domestic', type: 'stock',  currency: 'KRW' },
  { id: 'foreign',  name: '해외주식', badge: 'badge-foreign',  type: 'stock',  currency: 'USD' },
  { id: 'isa',      name: 'ISA',      badge: 'badge-isa',      type: 'stock',  currency: 'KRW' },
  { id: 'pension',  name: '연금',     badge: 'badge-pension',  type: 'stock',  currency: 'KRW' },
];

const CATEGORY_COLORS = ['#eab308','#22c55e','#3b82f6','#ec4899','#8b5cf6','#ef4444','#06b6d4'];
const HOLDING_COLORS = [
  '#6c7bff','#3b82f6','#06b6d4','#22c55e','#84cc16','#eab308','#f97316',
  '#ef4444','#ec4899','#8b5cf6','#14b8a6','#f59e0b','#64748b','#a78bfa',
  '#fb923c','#4ade80','#38bdf8','#c084fc','#fb7185','#facc15'
];

let exchangeRate = 1400;
let portfolio = {};
let searchTimeout = null;
let activeSearchAccId = null;
let searchResults = {}; // store results per accId
let searchActiveIdx = {}; // active index per accId

// ===================================================================
// INIT
// ===================================================================
let _fbListening = false;

function init() {
  const now = new Date();
  document.getElementById('currentDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 기준`;

  loadData();
  ACCOUNTS.forEach(a => { if (!portfolio[a.id]) portfolio[a.id] = []; });
  initCharts();
  fetchExchangeRate();
  renderAll();

  // Firebase 실시간 동기화 — SDK가 로드되면 리스너 등록
  const tryFirebase = () => {
    if (window._fbOnValue && !_fbListening) {
      _fbListening = true;
      let firstLoad = true;
      window._fbOnValue('portfolio', snapshot => {
        const data = snapshot.val();
        if (data) {
          portfolio = data;
          ACCOUNTS.forEach(a => { if (!portfolio[a.id]) portfolio[a.id] = []; });
          try { localStorage.setItem('portfolio_v2', JSON.stringify(portfolio)); } catch(e) {}
          renderAll();
          // 최초 로드 시 자동 시세 조회
          if (firstLoad) { firstLoad = false; refreshAllPrices(); }
        }
      });
    } else if (!window._fbOnValue) {
      setTimeout(tryFirebase, 300);
    }
  };
  setTimeout(tryFirebase, 300);
}

// ===================================================================
// EXCHANGE RATE
// ===================================================================
async function fetchExchangeRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if (data.rates?.KRW) {
      exchangeRate = data.rates.KRW;
      document.getElementById('exchangeRateDisplay').textContent = exchangeRate.toFixed(2) + ' 원';
      renderAll();
      return;
    }
  } catch(e) { console.warn('Exchange rate fetch failed', e); }
  document.getElementById('exchangeRateDisplay').textContent = exchangeRate.toFixed(2) + ' 원 (기본값)';
}

// ===================================================================
// STOCK SEARCH (Yahoo Finance)
// ===================================================================
function hasKorean(str) { return /[가-힣]/.test(str); }

// 한국 주식 DB (로컬)
let krStocksDB = null;
async function loadKrDB() {
  if (krStocksDB) return krStocksDB;
  try {
    const r = await fetch('./stocks_kr.json');
    krStocksDB = await r.json();
  } catch(e) { krStocksDB = []; }
  return krStocksDB;
}

function searchKrDB(query, db) {
  const q = query.trim().toLowerCase();
  // 정확히 시작하는 것 우선, 그 다음 포함되는 것
  const starts = db.filter(s => s.name.toLowerCase().startsWith(q));
  const contains = db.filter(s => !s.name.toLowerCase().startsWith(q) && s.name.toLowerCase().includes(q));
  return [...starts, ...contains].slice(0, 8).map(s => ({
    symbol: s.symbol,
    symbolAlt: s.symbol.endsWith('.KS') ? s.symbol.replace('.KS','.KQ') : s.symbol.replace('.KQ','.KS'),
    name: s.name,
    exchange: s.market,
    type: s.market === 'ETF' ? 'ETF' : 'EQUITY',
    code: s.symbol.slice(0, 6)
  }));
}

async function searchStock(query) {
  if (!query || query.length < 1) return [];

  // 한글 → 로컬 DB에서 검색
  if (hasKorean(query)) {
    const db = await loadKrDB();
    const results = searchKrDB(query, db);
    if (results.length > 0) return results;
  }

  // 영문 / 티커 → Yahoo Finance
  try {
    const yahooUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=10&newsCount=0&listsCount=0`;
    const res = await corsFetch(yahooUrl);
    if (res) {
      const data = await res.json();
      if (data.quotes?.length > 0) {
        return data.quotes
          .filter(q => q.quoteType === 'EQUITY' || q.quoteType === 'ETF')
          .map(q => {
            const sym = q.symbol || '';
            const market = sym.endsWith('.KS') ? 'KOSPI' : sym.endsWith('.KQ') ? 'KOSDAQ' : (q.exchDisp || q.exchange || '');
            return {
              symbol: sym,
              symbolAlt: sym.endsWith('.KS') ? sym.replace('.KS','.KQ') : sym.endsWith('.KQ') ? sym.replace('.KQ','.KS') : '',
              name: q.shortname || q.longname || sym,
              exchange: market,
              type: q.quoteType,
              code: (sym.endsWith('.KS') || sym.endsWith('.KQ')) ? sym.slice(0,6) : ''
            };
          });
      }
    }
  } catch(e) { console.warn('Yahoo search failed', e); }

  return [];
}

// Yahoo Finance exchangeName → 표시 이름
function mapExchange(name) {
  return { KSC: 'KOSPI', KOE: 'KOSDAQ', NMS: 'NASDAQ', NGM: 'NASDAQ', NCM: 'NASDAQ', NYQ: 'NYSE', PCX: 'NYSE Arca', ASE: 'NYSE American' }[name] || name || '';
}

async function fetchStockPrice(symbol, altSymbol) {
  const trySymbol = async (sym) => {
    // v8 chart API
    try {
      const res = await corsFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`);
      if (res) {
        const data = await res.json();
        const meta = data.chart?.result?.[0]?.meta;
        if (meta && meta.regularMarketPrice) {
          return {
            price: meta.regularMarketPrice,
            previousClose: meta.previousClose || meta.chartPreviousClose || 0,
            currency: meta.currency || 'KRW',
            symbol: meta.symbol,
            exchange: mapExchange(meta.exchangeName)
          };
        }
      }
    } catch(e) {}

    // v6 quote API fallback
    try {
      const res = await corsFetch(`https://query1.finance.yahoo.com/v6/finance/quote?symbols=${encodeURIComponent(sym)}`);
      if (res) {
        const data = await res.json();
        const q = data.quoteResponse?.result?.[0];
        if (q && q.regularMarketPrice) {
          return {
            price: q.regularMarketPrice,
            previousClose: q.regularMarketPreviousClose || 0,
            currency: q.currency || 'KRW',
            symbol: q.symbol,
            exchange: mapExchange(q.fullExchangeName || q.exchange)
          };
        }
      }
    } catch(e) {}
    return null;
  };

  const result = await trySymbol(symbol);
  if (result) {
    // 거래소 불일치 자동 수정: .KS 심볼인데 KOSDAQ 반환 → .KQ로 재시도 (반대도 마찬가지)
    const symIsKS = symbol.endsWith('.KS');
    const symIsKQ = symbol.endsWith('.KQ');
    const resIsKOSPI  = result.exchange === 'KOSPI';
    const resIsKOSDAQ = result.exchange === 'KOSDAQ';
    if ((symIsKS && resIsKOSDAQ) || (symIsKQ && resIsKOSPI)) {
      const corrected = symIsKS ? symbol.replace('.KS', '.KQ') : symbol.replace('.KQ', '.KS');
      const retry = await trySymbol(corrected);
      if (retry) return retry; // 올바른 거래소 결과 반환
    }
    return result;
  }

  // Try alternate symbol (KS ↔ KQ)
  if (altSymbol) {
    const alt = await trySymbol(altSymbol);
    if (alt) return alt;
  }

  return null;
}

async function refreshAllPrices() {
  const statusEl = document.getElementById('statusText');

  // 중복 제거: 유니크 심볼만 먼저 수집
  const symbolSet = new Set();
  ACCOUNTS.forEach(acc => {
    if (acc.type === 'stock') {
      (portfolio[acc.id] || []).forEach(item => { if (item.symbol) symbolSet.add(item.symbol); });
    }
  });

  const symbols = [...symbolSet];
  if (symbols.length === 0) { showToast('조회할 종목이 없습니다'); return; }
  statusEl.innerHTML = `<span class="loading-spinner"></span> 시세 조회중... (0/${symbols.length})`;

  // 심볼별 1회만 조회 후 캐시
  const priceCache = {};
  let done = 0;
  for (const sym of symbols) {
    const result = await fetchStockPrice(sym);
    if (result) priceCache[sym] = result;
    done++;
    statusEl.innerHTML = `<span class="loading-spinner"></span> 시세 조회중... (${done}/${symbols.length})`;
  }

  // 캐시된 결과를 모든 종목에 적용
  let total = 0;
  ACCOUNTS.forEach(acc => {
    if (acc.type !== 'stock') return;
    (portfolio[acc.id] || []).forEach(item => {
      if (!item.symbol) return;
      const r = priceCache[item.symbol];
      if (r) { item.price = r.price; item.previousClose = r.previousClose; }
      total++;
    });
  });

  statusEl.textContent = `마지막 시세 조회: ${new Date().toLocaleTimeString('ko-KR')}`;
  saveData();
  renderAll();
  showToast(`${total}개 종목 시세 업데이트 완료`);
}

// ===================================================================
// CALCULATIONS
// ===================================================================
function getItemEvalKRW(acc, item) {
  if (acc.type === 'cash') return parseFloat(item.amount) || 0;
  if (acc.type === 'dollar') return (parseFloat(item.amountUSD) || 0) * exchangeRate;
  const price = parseFloat(item.price) || 0;
  const qty = parseFloat(item.qty) || 0;
  const val = price * qty;
  return acc.currency === 'USD' ? val * exchangeRate : val;
}

function getItemPurchaseKRW(acc, item) {
  if (acc.type === 'cash' || acc.type === 'dollar') return getItemEvalKRW(acc, item);
  const avgPrice = parseFloat(item.avgPrice) || 0;
  const qty = parseFloat(item.qty) || 0;
  const val = avgPrice * qty;
  return acc.currency === 'USD' ? val * exchangeRate : val;
}

function getAccountTotal(accId) {
  const acc = ACCOUNTS.find(a => a.id === accId);
  return (portfolio[accId] || []).reduce((sum, item) => sum + getItemEvalKRW(acc, item), 0);
}

function getAccountPurchaseTotal(accId) {
  const acc = ACCOUNTS.find(a => a.id === accId);
  return (portfolio[accId] || []).reduce((sum, item) => sum + getItemPurchaseKRW(acc, item), 0);
}

// ===================================================================
// FORMATTING
// ===================================================================
const fmt = n => Math.round(n).toLocaleString('ko-KR');
const fmtKRW = n => fmt(n) + ' 원';
const fmtPct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const fmtPrice = (n, currency) => {
  if (currency === 'USD') return '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return fmt(n);
};

// 숫자 입력 포맷 (쉼표 표시)
const stripCommas = v => String(v).replace(/,/g, '');
const parseNum = v => parseFloat(stripCommas(v)) || 0;
const fmtInput = (v, isFloat) => {
  const n = parseNum(v);
  if (!n) return '';
  return isFloat ? n.toLocaleString('ko-KR', {minimumFractionDigits:2, maximumFractionDigits:4}) : n.toLocaleString('ko-KR');
};
function focusNum(el) { el.value = stripCommas(el.value); }
function blurNum(el, accId, idx, field, isFloat) {
  const raw = parseNum(el.value);
  el.value = raw ? fmtInput(raw, isFloat) : '';
  updateField(accId, idx, field, raw);
}
function makeNumInput(value, accId, idx, field, isFloat, style) {
  const display = value ? fmtInput(value, isFloat) : '';
  return `<input class="cell-edit" type="text" inputmode="decimal" value="${display}" ${style||''}
    onfocus="focusNum(this)"
    onblur="blurNum(this,'${accId}',${idx},'${field}',${!!isFloat})"
    onkeydown="if(event.key==='Enter')this.blur()">`;
}

// ===================================================================
// CHARTS
// ===================================================================
let categoryChart, holdingChart;

function initCharts() {
  const doughnutOpts = (cutout) => ({
    responsive: true, maintainAspectRatio: false, cutout,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const total = ctx.dataset.data.reduce((a,b)=>a+b, 0);
            const pct = total > 0 ? ((ctx.parsed/total)*100).toFixed(1) : 0;
            return `${ctx.label}: ${fmtKRW(ctx.parsed)} (${pct}%)`;
          }
        }
      }
    }
  });

  categoryChart = new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: CATEGORY_COLORS, borderWidth: 0, hoverOffset: 8 }] },
    options: doughnutOpts('65%')
  });
  holdingChart = new Chart(document.getElementById('holdingChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: HOLDING_COLORS, borderWidth: 0, hoverOffset: 8 }] },
    options: doughnutOpts('50%')
  });
}

function updateCharts() {
  // Category — 큰 자산군별 합산 + 툴팁에 증권사 세부 표시
  const catMap = {};

  // 현금
  const cashTotal = getAccountTotal('cash') + getAccountTotal('dollar');
  if (cashTotal > 0) catMap['현금'] = cashTotal;

  // 국내주식 합산
  const domTotal = getAccountTotal('domestic');
  if (domTotal > 0) catMap['국내주식'] = domTotal;

  // ISA 합산
  const isaTotal = getAccountTotal('isa');
  if (isaTotal > 0) catMap['ISA'] = isaTotal;

  // 연금 합산
  const penTotal = getAccountTotal('pension');
  if (penTotal > 0) catMap['연금'] = penTotal;

  // 해외주식
  const foreignTotal = getAccountTotal('foreign');
  if (foreignTotal > 0) catMap['해외주식'] = foreignTotal;

  // 증권사별 세부 데이터 (툴팁용)
  const brokerDetail = {};
  ['domestic','isa','pension'].forEach(accId => {
    const acc = ACCOUNTS.find(a => a.id === accId);
    const label = accId === 'domestic' ? '국내주식' : accId === 'isa' ? 'ISA' : '연금';
    const bMap = {};
    (portfolio[accId] || []).forEach(item => {
      const val = getItemEvalKRW(acc, item);
      if (val > 0) {
        const b = item.broker || '기타';
        bMap[b] = (bMap[b] || 0) + val;
      }
    });
    brokerDetail[label] = bMap;
  });

  const catLabels = Object.keys(catMap);
  const catData   = Object.values(catMap);
  categoryChart.data.labels = catLabels;
  categoryChart.data.datasets[0].data = catData;
  categoryChart.data.datasets[0].backgroundColor = CATEGORY_COLORS;
  // 툴팁 커스텀: 증권사 세부 표시
  categoryChart.options.plugins.tooltip.callbacks.label = ctx => {
    const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
    const pct = total > 0 ? ((ctx.parsed/total)*100).toFixed(1) : 0;
    const lines = [`${ctx.label}: ${fmtKRW(ctx.parsed)} (${pct}%)`];
    const detail = brokerDetail[ctx.label];
    if (detail) {
      Object.entries(detail).forEach(([b, v]) => {
        const bp = total > 0 ? ((v/total)*100).toFixed(1) : 0;
        lines.push(`  └ ${b}: ${fmtKRW(v)} (${bp}%)`);
      });
    }
    return lines;
  };
  categoryChart.update();
  renderLegend('categoryLegend', catLabels, catData, CATEGORY_COLORS);

  // Holdings — 같은 종목명끼리 합산
  const hMap = {};
  ACCOUNTS.forEach(acc => {
    (portfolio[acc.id] || []).forEach(item => {
      const val = getItemEvalKRW(acc, item);
      if (val > 0) {
        const key = item.name || '미지정';
        hMap[key] = (hMap[key] || 0) + val;
      }
    });
  });
  // 금액 큰 순으로 정렬
  const sorted = Object.entries(hMap).sort((a, b) => b[1] - a[1]);
  const hLabels = sorted.map(e => e[0]);
  const hData   = sorted.map(e => e[1]);
  holdingChart.data.labels = hLabels;
  holdingChart.data.datasets[0].data = hData;
  holdingChart.update();
  renderLegend('holdingLegend', hLabels, hData, HOLDING_COLORS);
}

function renderLegend(id, labels, data, colors) {
  const total = data.reduce((a,b) => a+b, 0);
  document.getElementById(id).innerHTML = labels.map((l,i) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${colors[i%colors.length]}"></div>
      <span>${l}</span>
      <span class="legend-value">${total > 0 ? ((data[i]/total)*100).toFixed(1) : 0}%</span>
    </div>`
  ).join('');
}

// ===================================================================
// RENDER
// ===================================================================
function renderAll() {
  // Grand totals
  let grandEval = 0, grandPurchase = 0;
  ACCOUNTS.forEach(acc => {
    grandEval += getAccountTotal(acc.id);
    grandPurchase += getAccountPurchaseTotal(acc.id);
  });
  document.getElementById('totalValue').textContent = fmtKRW(grandEval);

  const pnl = grandEval - grandPurchase;
  const pnlPct = grandPurchase > 0 ? (pnl / grandPurchase) * 100 : 0;
  const pnlEl = document.getElementById('totalPnl');
  if (grandPurchase > 0 && grandPurchase !== grandEval) {
    const cls = pnl >= 0 ? 'positive' : 'negative';
    pnlEl.className = `total-pnl ${cls}`;
    pnlEl.textContent = `${pnl >= 0 ? '+' : ''}${fmt(pnl)} 원 (${fmtPct(pnlPct)})`;
  } else {
    pnlEl.textContent = '';
  }

  updateCharts();
  renderAccounts();
}

function renderAccounts() {
  const container = document.getElementById('accountsContainer');
  container.innerHTML = '';
  ACCOUNTS.forEach(acc => container.appendChild(createAccountCard(acc)));
}

function createAccountCard(acc) {
  const card = document.createElement('div');
  card.className = 'account-card';
  const items = portfolio[acc.id] || [];
  const evalTotal = getAccountTotal(acc.id);
  const purchaseTotal = getAccountPurchaseTotal(acc.id);
  const pnl = evalTotal - purchaseTotal;
  const pnlPct = purchaseTotal > 0 ? (pnl / purchaseTotal) * 100 : 0;

  let subtotalHTML = `<div class="subtotal-item">
    <div class="subtotal-label">평가금액</div>
    <div class="subtotal-value">${fmtKRW(evalTotal)}</div>
  </div>`;

  if (acc.type === 'stock' && purchaseTotal > 0) {
    const cls = pnl >= 0 ? 'positive' : 'negative';
    subtotalHTML += `<div class="subtotal-item">
      <div class="subtotal-label">평가손익</div>
      <div class="subtotal-value ${cls}">${pnl >= 0 ? '+' : ''}${fmt(pnl)} 원 (${fmtPct(pnlPct)})</div>
    </div>`;
  }

  card.innerHTML = `
    <div class="account-header" onclick="toggleSection('${acc.id}')">
      <h3><span class="badge ${acc.badge}">${acc.name}</span> <span class="toggle-icon" id="tog-${acc.id}">▼</span></h3>
      <div class="account-subtotal">${subtotalHTML}</div>
    </div>
    <div class="account-body" id="body-${acc.id}">
      <div class="table-scroll">${renderTableForAccount(acc, items)}</div>
      ${renderAddArea(acc)}
    </div>`;
  return card;
}

function renderTableForAccount(acc, items) {
  if (items.length === 0) return '<div class="empty-state">항목을 추가해주세요</div>';

  if (acc.type === 'cash') {
    return `<table><thead><tr>
      <th width="24"></th><th style="text-align:left">항목</th><th>금액 (원)</th><th width="40"></th>
    </tr></thead><tbody>${items.map((item, i) => `<tr draggable="true"
      ondragstart="onDragStart(event,'${acc.id}',${i})"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,'${acc.id}',${i})">
      <td class="drag-handle">⠿</td>
      <td style="text-align:left"><input class="cell-edit" type="text" value="${item.name||''}" style="text-align:left;width:180px"
        onblur="updateField('${acc.id}',${i},'name',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"></td>
      <td>${makeNumInput(item.amount||0, acc.id, i, 'amount', false)}</td>
      <td><button class="btn-icon" onclick="removeItem('${acc.id}',${i})">×</button></td>
    </tr>`).join('')}</tbody></table>`;
  }

  if (acc.type === 'dollar') {
    return `<table><thead><tr>
      <th style="text-align:left">항목</th><th>달러 ($)</th><th>원화 환산</th><th width="40"></th>
    </tr></thead><tbody>${items.map((item, i) => {
      const usd = parseFloat(item.amountUSD) || 0;
      return `<tr>
        <td><input class="cell-edit" type="text" value="${item.name||''}" style="text-align:left;width:180px"
          onblur="updateField('${acc.id}',${i},'name',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td>${makeNumInput(item.amountUSD||0, acc.id, i, 'amountUSD', true)}</td>
        <td>${fmtKRW(usd * exchangeRate)}</td>
        <td><button class="btn-icon" onclick="removeItem('${acc.id}',${i})">×</button></td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }

  // Stock type
  const isUSD = acc.currency === 'USD';
  return `<table><thead><tr>
    <th style="text-align:left">종목명</th>
    <th>현재가${isUSD?' ($)':''}</th>
    <th>전일대비</th>
    <th>보유수량</th>
    <th>평가금액${isUSD?' (원)':''}</th>
    <th>평균단가</th>
    <th>매입금액</th>
    <th>평가손익</th>
    <th>수익률</th>
    <th width="60"></th>
  </tr></thead><tbody>${items.map((item, i) => {
    const price = parseFloat(item.price) || 0;
    const qty = parseFloat(item.qty) || 0;
    const avgPrice = parseFloat(item.avgPrice) || 0;
    const prevClose = parseFloat(item.previousClose) || price;
    const change = price - prevClose;
    const changePct = prevClose > 0 ? (change / prevClose) * 100 : 0;
    const evalAmt = price * qty;
    const purchaseAmt = avgPrice * qty;
    const evalKRW = isUSD ? evalAmt * exchangeRate : evalAmt;
    const purchaseKRW = isUSD ? purchaseAmt * exchangeRate : purchaseAmt;
    const pnl = evalKRW - purchaseKRW;
    const pnlPct = purchaseKRW > 0 ? (pnl / purchaseKRW) * 100 : 0;
    const pnlCls = pnl >= 0 ? 'positive' : 'negative';
    const chgCls = change >= 0 ? 'positive' : 'negative';

    return `<tr>
      <td>
        ${item.name}
        <input class="broker-input" type="text" value="${item.broker||''}"
          placeholder="증권사"
          onblur="updateField('${acc.id}',${i},'broker',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          title="증권사 클릭하여 수정">
        ${item.symbol ? `<br><span style="font-size:11px;color:var(--text-muted)">${item.symbol}</span>` : ''}
      </td>
      <td>${fmtPrice(price, isUSD?'USD':'KRW')}</td>
      <td class="${chgCls}">${change >= 0 ? '+' : ''}${isUSD ? change.toFixed(2) : fmt(change)} (${fmtPct(changePct)})</td>
      <td>${makeNumInput(qty, acc.id, i, 'qty', false, 'style="width:80px"')}</td>
      <td>${fmtKRW(evalKRW)}</td>
      <td>${makeNumInput(avgPrice, acc.id, i, 'avgPrice', isUSD, '')}</td>
      <td>${isUSD ? fmtKRW(purchaseKRW) : fmt(purchaseAmt)}</td>
      <td class="${pnlCls}">${pnl >= 0?'+':''}${fmt(pnl)}</td>
      <td class="${pnlCls}">${fmtPct(pnlPct)}</td>
      <td>
        <button class="btn-refresh" onclick="refreshSingle('${acc.id}',${i})" title="시세 새로고침">↻</button>
        <button class="btn-icon" onclick="removeItem('${acc.id}',${i})">×</button>
      </td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

// ===================================================================
let selectedStock = {}; // per account

function onSearchInput(accId, query) {
  clearTimeout(searchTimeout);
  selectedStock[accId] = null;
  searchActiveIdx[accId] = -1;
  const resultsEl = document.getElementById(`results-${accId}`);

  if (query.length < 1) { resultsEl.classList.remove('show'); searchResults[accId] = []; return; }

  searchTimeout = setTimeout(async () => {
    const statusEl = document.getElementById(`search-status-${accId}`);
    statusEl.innerHTML = '<span class="loading-spinner"></span>';
    const results = await searchStock(query);
    statusEl.textContent = '';
    searchResults[accId] = results;
    searchActiveIdx[accId] = -1;
    renderSearchResults(accId);
  }, 300);
}

function getMarketBadge(r) {
  const ex = (r.exchange || '').toUpperCase();
  const type = (r.type || '').toUpperCase();
  if (type === 'ETF') return `<span class="sr-market etf">ETF</span>`;
  if (ex.includes('KOSPI') || ex.includes('KSC')) return `<span class="sr-market kospi">KOSPI</span>`;
  if (ex.includes('KOSDAQ') || ex.includes('KOE')) return `<span class="sr-market kosdaq">KOSDAQ</span>`;
  if (ex.includes('KRX') || ex.includes('KSE') || r.symbol?.endsWith('.KS')) return `<span class="sr-market kospi">KOSPI</span>`;
  if (r.symbol?.endsWith('.KQ')) return `<span class="sr-market kosdaq">KOSDAQ</span>`;
  return `<span class="sr-market us">${ex || 'US'}</span>`;
}

function positionDropdown(accId) {
  const inputEl = document.getElementById(`search-${accId}`);
  const resultsEl = document.getElementById(`results-${accId}`);
  if (!inputEl || !resultsEl) return;

  const rect = inputEl.getBoundingClientRect();
  const itemHeight = 52;
  const visibleCount = Math.min(5, (searchResults[accId] || []).length || 1);
  const dropH = itemHeight * visibleCount;

  // Show above or below based on available space
  const spaceAbove = rect.top;
  const spaceBelow = window.innerHeight - rect.bottom;

  if (spaceAbove > dropH + 8 || spaceAbove > spaceBelow) {
    // show above
    resultsEl.style.top = (rect.top - dropH - 6) + 'px';
  } else {
    // show below
    resultsEl.style.top = (rect.bottom + 6) + 'px';
  }
  resultsEl.style.left = rect.left + 'px';
  resultsEl.style.height = dropH + 'px';
}

function renderSearchResults(accId) {
  const resultsEl = document.getElementById(`results-${accId}`);
  const results = searchResults[accId] || [];
  const activeIdx = searchActiveIdx[accId] ?? -1;

  if (results.length === 0) {
    resultsEl.innerHTML = `<div class="search-result-item" style="color:var(--text-muted);cursor:default;justify-content:center">검색 결과가 없습니다</div>`;
    positionDropdown(accId);
    resultsEl.classList.add('show');
    return;
  }

  resultsEl.innerHTML = results.map((r, i) => {
    return `<div class="search-result-item${i === activeIdx ? ' active' : ''}"
      data-accid="${accId}" data-idx="${i}"
      onmouseenter="searchActiveIdx['${accId}']=${i}; renderSearchResults('${accId}')">
      <div class="sr-left">
        <span class="sr-name">${r.name}</span>
        <div class="sr-meta">
          ${r.code ? `<span class="sr-code">${r.code}</span>` : ''}
          ${getMarketBadge(r)}
        </div>
      </div>
      <div class="sr-right">
        <div class="sr-ticker">${r.symbol}</div>
      </div>
    </div>`;
  }).join('');

  positionDropdown(accId);
  resultsEl.classList.add('show');
}

function onSearchKeydown(e, accId) {
  const results = searchResults[accId] || [];
  if (results.length === 0) return;

  const resultsEl = document.getElementById(`results-${accId}`);
  if (!resultsEl.classList.contains('show')) return;

  let idx = searchActiveIdx[accId] ?? -1;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = idx < results.length - 1 ? idx + 1 : 0;
    searchActiveIdx[accId] = idx;
    renderSearchResults(accId);
    // scroll into view
    const items = resultsEl.querySelectorAll('.search-result-item');
    if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = idx > 0 ? idx - 1 : results.length - 1;
    searchActiveIdx[accId] = idx;
    renderSearchResults(accId);
    const items = resultsEl.querySelectorAll('.search-result-item');
    if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (idx >= 0 && idx < results.length) {
      const r = results[idx];
      selectStock(accId, r.symbol, r.name, r.exchange, r.symbolAlt || '');
    }
  } else if (e.key === 'Escape') {
    resultsEl.classList.remove('show');
  }
}

async function selectStock(accId, symbol, name, exchange, altSymbol) {
  const searchInput = document.getElementById(`search-${accId}`);
  const resultsEl = document.getElementById(`results-${accId}`);
  const statusEl = document.getElementById(`search-status-${accId}`);

  searchInput.value = name;
  resultsEl.classList.remove('show');
  searchResults[accId] = [];
  statusEl.innerHTML = '<span class="loading-spinner"></span> 시세 조회중...';

  const priceData = await fetchStockPrice(symbol, altSymbol || '');
  // use the actual resolved symbol if alt was used; override exchange from Yahoo if available
  const resolvedSymbol = priceData?.symbol || symbol;
  const resolvedExchange = priceData?.exchange || exchange;
  selectedStock[accId] = { symbol: resolvedSymbol, name, exchange: resolvedExchange };

  if (priceData) {
    selectedStock[accId].price = priceData.price;
    selectedStock[accId].previousClose = priceData.previousClose;
    selectedStock[accId].currency = priceData.currency;
    statusEl.innerHTML = `<span style="color:var(--green)">✓</span> 현재가: ${fmtPrice(priceData.price, priceData.currency)}`;
    document.getElementById(`add-${accId}-qty`)?.focus();
  } else {
    statusEl.innerHTML = `<span style="color:var(--yellow)">!</span> 시세 조회 실패 — 수동으로 현재가를 입력해주세요`;
  }
}

// 검색 결과 클릭 — data 속성으로 선택 (한글 onclick 파싱 오류 방지)
document.addEventListener('click', e => {
  const item = e.target.closest('.search-result-item[data-idx]');
  if (item) {
    const accId = item.dataset.accid;
    const idx = parseInt(item.dataset.idx);
    const r = (searchResults[accId] || [])[idx];
    if (r) selectStock(accId, r.symbol, r.name, r.exchange, r.symbolAlt || '');
    return;
  }
  // 외부 클릭 시 닫기
  if (!e.target.closest('.search-wrap') && !e.target.closest('.search-results')) {
    document.querySelectorAll('.search-results').forEach(el => el.classList.remove('show'));
  }
});

// ===================================================================
// ADD / UPDATE / REMOVE
// ===================================================================
function addCashItem(accId) {
  const name = document.getElementById(`add-${accId}-name`).value || '현금';
  const amount = parseNum(document.getElementById(`add-${accId}-amount`).value);
  portfolio[accId].push({ name, amount });
  saveData(); renderAll();
}

function addDollarItem(accId) {
  const name = document.getElementById(`add-${accId}-name`).value || '달러';
  const amountUSD = parseNum(document.getElementById(`add-${accId}-usd`).value);
  portfolio[accId].push({ name, amountUSD });
  saveData(); renderAll();
}

async function addStockItem(accId) {
  const acc = ACCOUNTS.find(a => a.id === accId);
  const searchInput = document.getElementById(`search-${accId}`);
  const qtyInput = document.getElementById(`add-${accId}-qty`);
  const avgInput = document.getElementById(`add-${accId}-avg`);

  const sel = selectedStock[accId];
  const name = searchInput.value.trim();
  if (!name) { showToast('종목명을 입력해주세요'); return; }

  const brokerInput = document.getElementById(`add-${accId}-broker`);
  const item = {
    name: sel?.name || name,
    symbol: sel?.symbol || '',
    qty: parseNum(qtyInput.value) || 0,
    avgPrice: parseNum(avgInput.value) || 0,
    price: sel?.price || 0,
    previousClose: sel?.previousClose || 0,
    broker: brokerInput?.value.trim() || '',
  };

  // If no price yet and we have a symbol, try to fetch
  if (!item.price && item.symbol) {
    const data = await fetchStockPrice(item.symbol);
    if (data) {
      item.price = data.price;
      item.previousClose = data.previousClose;
    }
  }

  portfolio[accId].push(item);
  selectedStock[accId] = null;
  searchInput.value = '';
  qtyInput.value = '';
  avgInput.value = '';
  if (brokerInput) brokerInput.value = '';
  document.getElementById(`search-status-${accId}`).textContent = '';

  saveData(); renderAll();
  showToast(`${item.name} 추가 완료`);
}

function updateField(accId, index, field, value) {
  portfolio[accId][index][field] = value;
  saveData(); renderAll();
}

// ===== DRAG & DROP 정렬 =====
let _dragAccId = null, _dragIdx = null;
function onDragStart(e, accId, idx) {
  _dragAccId = accId; _dragIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, accId, toIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (_dragAccId !== accId || _dragIdx === null || _dragIdx === toIdx) return;
  const arr = portfolio[accId];
  const [moved] = arr.splice(_dragIdx, 1);
  arr.splice(toIdx, 0, moved);
  _dragIdx = null;
  saveData(); renderAll();
}

function removeItem(accId, index) {
  const name = portfolio[accId][index]?.name || '';
  portfolio[accId].splice(index, 1);
  saveData(); renderAll();
  showToast(`${name} 삭제됨`);
}

async function refreshSingle(accId, index) {
  const item = portfolio[accId][index];
  if (!item?.symbol) { showToast('종목 심볼이 없어 조회할 수 없습니다'); return; }

  const data = await fetchStockPrice(item.symbol);
  if (data) {
    item.price = data.price;
    item.previousClose = data.previousClose;
    saveData(); renderAll();
    showToast(`${item.name} 시세 업데이트`);
  } else {
    showToast('시세 조회 실패');
  }
}

function toggleSection(accId) {
  const body = document.getElementById(`body-${accId}`);
  const tog = document.getElementById(`tog-${accId}`);
  body.classList.toggle('collapsed');
  tog.closest('.account-header').classList.toggle('collapsed');
}

// ===================================================================
// PERSISTENCE
// ===================================================================
function saveData() {
  // Firebase에 저장 (비동기, 에러 무시)
  if (window._fbSet) {
    window._fbSet('portfolio', portfolio).catch(e => console.warn('Firebase save error', e));
  }
  // 로컬에도 백업
  try {
    localStorage.setItem('portfolio_v2', JSON.stringify(portfolio));
  } catch(e) {}
}

function loadData() {
  // localStorage 백업에서 먼저 로드 (Firebase 연결 전 빈 화면 방지)
  try {
    const saved = localStorage.getItem('portfolio_v2');
    if (saved) portfolio = JSON.parse(saved);
    const rate = localStorage.getItem('portfolio_exchange_rate');
    if (rate) exchangeRate = parseFloat(rate);
  } catch(e) { console.warn('Load failed', e); }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify({
    version: 2, data: portfolio, exchangeRate,
    exportDate: new Date().toISOString()
  }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('내보내기 완료');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      portfolio = imported.data || imported;
      if (imported.exchangeRate) exchangeRate = imported.exchangeRate;
      ACCOUNTS.forEach(a => { if (!portfolio[a.id]) portfolio[a.id] = []; });
      saveData(); renderAll();
      showToast('데이터 불러오기 완료');
    } catch(err) { showToast('파일을 읽을 수 없습니다'); }
  };
  reader.readAsText(file);
}

// ===================================================================
// TOAST
// ===================================================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// GO
init();
</script>
